<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>KOLOSVIT ASBL Luxembourg</title>

  <meta name="description" content="KOLOSVIT ASBL — human-centered nonprofit initiative based in Luxembourg.">

  <style>
    body {
      margin: 0;
      background: #f3f1eb;
      color: #2f3437;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 640px;
      width: 100%;
    }

    .languages {
      display: flex;
      gap: 10px;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }

    .languages a {
      text-decoration: none;
      color: #4a5560;
      border: 1px solid #cfc9bc;
      padding: 8px 14px;
      font-size: 13px;
      letter-spacing: 1px;
      transition: 0.2s;
    }

    .languages a:hover {
      background: #e7e2d7;
    }

    .logo {
      width: 220px;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 34px;
      font-weight: 500;
      margin-bottom: 18px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 17px;
      line-height: 1.7;
      color: #50585d;
      max-width: 560px;
      margin-bottom: 40px;
    }

    .info {
      font-size: 14px;
      line-height: 1.9;
      color: #666;
      margin-bottom: 40px;
    }

    a {
      color: #50636f;
    }

    .survey {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      border-bottom: 1px solid #999;
      padding-bottom: 2px;
    }

    .qr {
      width: 120px;
      opacity: 0.85;
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
      }

      .logo {
        width: 180px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="languages">
      <a href="#">EN</a>
      <a href="#">UK</a>
      <a href="#">FR</a>
    </div>

    <img src="Logo_ASBL_KOLOSVIT_Luxembourg.jpg" class="logo">

    <h1>KOLOSVIT ASBL</h1>

    <div class="subtitle">
      Human resilience, education, social support and research initiatives based in Luxembourg.
    </div>

    <div class="info">
      Registered Luxembourg ASBL — RCS F15616
      <br><br>

      Email:
      <a href="mailto:kolosvit@proton.me">
        kolosvit@proton.me
      </a>

      <br>

      Telegram:
      <a href="https://t.me/kolosvit_lux">
        t.me/kolosvit_lux
      </a>

      <br><br>

      <a class="survey" href="https://forms.gle/uLfQNMviJR4bRm1XA">
        Take the survey
      </a>

    <img src="quar.png" class="qr">
