  <style>
    body {
      margin: 0;
      background: #f3f1eb;
      color: #2f3437;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      max-width: 1100px;
      margin: 0 auto;
      gap: 40px;
    }

    .languages {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .languages a {
      text-decoration: none;
      color: #4a5560;
      border: 1px solid #cfc9bc;
      padding: 8px 14px;
      font-size: 13px;
      letter-spacing: 1px;
      transition: 0.2s;
    }

    .languages a:hover {
      background: #e7e2d7;
    }

    .menu {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .menu a {
      text-decoration: none;
      color: #4a5560;
      border: 1px solid #cfc9bc;
      padding: 8px 14px;
      font-size: 13px;
      letter-spacing: 1px;
      transition: 0.2s;
    }

    .menu a:hover {
      background: #e7e2d7;
    }

    .container {
      max-width: 640px;
      margin: 90px auto 0 auto;
    }

    .logo {
      width: 220px;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 34px;
      font-weight: 500;
      margin-bottom: 18px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 17px;
      line-height: 1.7;
      color: #50585d;
      max-width: 560px;
      margin-bottom: 36px;
    }

    .info {
      font-size: 14px;
      line-height: 1.9;
      color: #666;
    }

    a {
      color: #50636f;
    }

    .survey {
      display: inline-block;
      margin-top: 10px;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
      color: #39464f;
    }

    .qr {
      width: 170px;
      opacity: 0.82;
      margin-top: 24px;
    }

    @media (max-width: 800px) {

      .topbar {
        flex-direction: column;
        gap: 20px;
      }

      .container {
        margin-top: 60px;
      }

      h1 {
        font-size: 28px;
      }

      .logo {
        width: 180px;
      }
    }
  </style>
